<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nature Nurture Wellbeing</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Quicksand', Arial, sans-serif;
      color: white;
    }

    .hero {
      min-height: 100vh;
      background: url("natureshop.jpg") center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.34);
    }

    .overlay {
      position: relative;
      z-index: 1;
      max-width: 900px;
      width: 100%;
      text-align: center;
      background: rgba(35, 35, 35, 0.26);
      border: 1px solid rgba(255,255,255,0.24);
      border-radius: 38px;
      padding: 3rem 2rem;
      box-shadow: 0 0 35px rgba(255,255,255,0.10);
      backdrop-filter: blur(8px);
    }

    h1 {
      font-family: 'IM Fell English', serif;
      font-size: clamp(2.3rem, 5vw, 4.2rem);
      margin: 0 0 1rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.25);
    }

    p {
      max-width: 680px;
      margin: 0 auto 2rem;
      font-size: 1.12rem;
      line-height: 1.6;
    }

    .button-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .btn {
      display: inline-block;
      min-width: 210px;
      padding: 14px 24px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.78);
      background: rgba(255,255,255,0.10);
      color: white;
      box-shadow: 0 0 18px rgba(255,255,255,0.18);
      transition: all 0.2s ease;
    }

    .btn:hover,
    .btn:focus {
      background: white;
      color: black;
      box-shadow: 0 0 24px rgba(255,255,255,0.35);
      transform: translateY(-2px);
    }

    .small-row {
      margin-top: 1.2rem;
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .small-btn {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.08);
      color: white;
      transition: all 0.2s ease;
    }

    .small-btn:hover {
      background: white;
      color: black;
    }

    @media (max-width: 700px) {
      .overlay {
        padding: 2rem 1.2rem;
      }

      .btn {
        width: 100%;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="overlay">
      <h1>✨ Nature Nurture Wellbeing ✨</h1>
      <p>
        You’ve stepped inside. From here you can continue along the path into Sanctuary Falls,
        or go directly into the shop and explore what’s waiting within.
      </p>

      <div class="button-row">
        <a href="signs.html" class="btn">🌿 Continue the Path</a>
        <a href="insideshop.html" class="btn">🛍️ Go in the Shop</a>
      </div>

      <div class="small-row">
        <a href="index.html" class="small-btn">← Back</a>
      </div>
    </div>
  </section>
</body>
</html>
