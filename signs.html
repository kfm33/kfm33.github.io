<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sanctuary Path</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      color: white;
      background: #5a432f;
    }

    .hero {
      min-height: 100vh;
      background: #5a432f url("SanctuaryFalls.png") center/cover no-repeat;
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 2rem 1rem 3rem;
      box-sizing: border-box;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(25, 18, 10, 0.12);
    }

    .content {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 980px;
      text-align: center;
    }

    .leaf-wrap {
      margin-bottom: 2.2rem;
    }

    .leaf-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 78px;
      height: 58px;
      font-size: 1.7rem;
      text-decoration: none;
      color: white;
      border: 1px solid rgba(255,255,255,0.75);
      background: rgba(255,255,255,0.10);
      box-shadow: 0 0 16px rgba(255,255,255,0.14);
      backdrop-filter: blur(4px);
      transition: all 0.2s ease;
      border-radius: 60% 40% 60% 40% / 55% 45% 55% 45%;
    }

    .leaf-btn:hover {
      background: white;
      color: black;
      box-shadow: 0 0 24px rgba(255,255,255,0.30);
      transform: translateY(-2px) scale(1.04);
    }

    .message-box {
      display: none;
      max-width: 620px;
      margin: 0 auto 2rem;
      padding: 1rem 1.2rem;
      border-radius: 22px;
      background: rgba(32, 22, 14, 0.28);
      border: 1px solid rgba(255,255,255,0.22);
      backdrop-filter: blur(6px);
      font-size: 1.02rem;
      line-height: 1.6;
    }

    h1 {
      font-size: clamp(2.8rem, 5vw, 4.2rem);
      margin: 0 0 0.5rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.35);
    }

    .sub {
      font-size: 1.15rem;
      margin-bottom: 2.2rem;
      text-shadow: 0 2px 8px rgba(0,0,0,0.28);
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .buttons button {
      padding: 12px 24px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.72);
      background: rgba(255,255,255,0.10);
      color: white;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 0 16px rgba(255,255,255,0.14);
      transition: all 0.2s ease;
      backdrop-filter: blur(4px);
    }

    .buttons button:hover {
      background: white;
      color: black;
      box-shadow: 0 0 22px rgba(255,255,255,0.28);
      transform: translateY(-2px);
    }

    @media (max-width: 700px) {
      .hero {
        padding: 1.5rem 1rem 2rem;
      }

      .leaf-wrap {
        margin-bottom: 1.6rem;
      }

      .sub {
        margin-bottom: 1.6rem;
      }

      .buttons button {
        width: 100%;
        max-width: 320px;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="content">

      <div class="leaf-wrap">
        <a href="#" class="leaf-btn" onclick="generateMessage(); return false;" title="Reveal your message">🍃</a>
      </div>

      <div id="messageBox" class="message-box">
        <div><strong>Affirmation:</strong> <span id="affirmation"></span></div>
      </div>

      <h1>Walk gently...</h1>
      <div class="sub">You are safe here.</div>

      <div class="buttons">
        <button onclick="location.href='falls.html'">Continue to the Falls</button>
        <button onclick="location.href='cafe.html'">Visit the Woodland Café</button>
        <button onclick="location.href='river.html'">Sit by the River</button>
        <button onclick="location.href='natureshop.html'">Back</button>
      </div>
    </div>
  </section>

  <script>
    function generateMessage() {
      const affirmations = [
        "Like the quiet river, you are allowed to flow gently today.",
        "You do not need to rush — the forest grows in its own time.",
        "Your energy is enough, even in stillness.",
        "Breathe in calm, breathe out pressure.",
        "You are held, even when things feel uncertain."
      ];

      const chosen = affirmations[Math.floor(Math.random() * affirmations.length)];
      document.getElementById("affirmation").textContent = chosen;
      document.getElementById("messageBox").style.display = "block";
    }
  </script>
</body>
</html>
