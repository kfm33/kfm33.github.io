<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sanctuary Path</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      color: white;
      background: #4a3528;
    }

    .hero {
      min-height: 100vh;
      background: #4a3528 url("Landingpagesignpostsanctuaryfalls.png") center center / cover no-repeat;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      box-sizing: border-box;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(22, 14, 8, 0.18);
    }

    .content {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 820px;
      text-align: center;
      padding: 1rem;
    }

    h1 {
      font-size: clamp(2.6rem, 5vw, 4rem);
      margin: 0 0 0.4rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.38);
    }

    .sub {
      font-size: 1.15rem;
      margin-bottom: 1.6rem;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .leaf-wrap {
      margin: 0 auto 1.2rem;
    }

    .leaf-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 74px;
      height: 54px;
      font-size: 1.6rem;
      text-decoration: none;
      color: white;
      border: 1px solid rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.12);
      box-shadow: 0 0 16px rgba(255,255,255,0.16);
      backdrop-filter: blur(4px);
      transition: all 0.2s ease;
      border-radius: 60% 40% 60% 40% / 55% 45% 55% 45%;
    }

    .leaf-btn:hover {
      background: white;
      color: black;
      box-shadow: 0 0 24px rgba(255,255,255,0.3);
      transform: translateY(-2px) scale(1.04);
    }

    .message-box {
      display: none;
      max-width: 620px;
      margin: 0 auto 1.5rem;
      padding: 0.95rem 1.1rem;
      border-radius: 22px;
      background: rgba(32, 22, 14, 0.26);
      border: 1px solid rgba(255,255,255,0.24);
      backdrop-filter: blur(6px);
      font-size: 1.02rem;
      line-height: 1.6;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 0.9rem;
      flex-wrap: wrap;
      margin-top: 1.2rem;
    }

    .buttons button {
      padding: 12px 22px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.78);
      background: rgba(255,255,255,0.12);
      color: white;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 0 16px rgba(255,255,255,0.14);
      transition: all 0.2s ease;
      backdrop-filter: blur(4px);
    }

    .buttons button:hover {
      background: white;
      color: black;
      box-shadow: 0 0 22px rgba(255,255,255,0.28);
      transform: translateY(-2px);
    }

    @media (max-width: 700px) {
      .buttons button {
        width: 100%;
        max-width: 320px;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="content">
      <h1>Walk gently...</h1>
      <div class="sub">You are safe here.</div>

      <div class="leaf-wrap">
        <a href="#" class="leaf-btn" onclick="generateMessage(); return false;" title="Reveal your message">🍃</a>
      </div>

      <div id="messageBox" class="message-box">
        <div><strong>Affirmation:</strong> <span id="affirmation"></span></div>
      </div>

      <div class="buttons">
        <button onclick="location.href='falls.html'">Continue to the Falls</button>
        <button onclick="location.href='cafe.html'">Visit the Woodland Café</button>
        <button onclick="location.href='river.html'">Sit by the River</button>
        <button onclick="location.href='natureshop.html'">Back</button>
      </div>
    </div>
  </section>

  <script>
    function generateMessage() {
      const affirmations = [
        "Like the quiet river, you are allowed to flow gently today.",
        "You do not need to rush — the forest grows in its own time.",
        "Your energy is enough, even in stillness.",
        "Breathe in calm, breathe out pressure.",
        "You are held, even when things feel uncertain.",
        "You can move slowly and still be moving forward.",
        "Gentleness is strength in its softest form.",
        "There is no rush here.",
        "You are allowed to pause without guilt.",
        "Peace can meet you exactly where you are."
      ];

      const chosen = affirmations[Math.floor(Math.random() * affirmations.length)];
      document.getElementById("affirmation").textContent = chosen;
      document.getElementById("messageBox").style.display = "block";
    }
  </script>
</body>
</html>
