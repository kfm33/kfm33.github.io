<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sanctuary Path</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Georgia', serif;
      background: url('sanctuarypath.jpg') no-repeat center center fixed;
      background-size: cover;
      color: white;
      text-align: center;
    }

    .overlay {
      background: rgba(0, 0, 0, 0.35);
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-size: 2.5em;
      margin: 0;
      animation: fadeIn 3s ease-in;
      text-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }

    p {
      font-size: 1.2em;
      margin-top: 10px;
      animation: fadeIn 5s ease-in;
      text-shadow: 0 2px 10px rgba(0,0,0,0.45);
    }

    .leaf-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 74px;
      height: 54px;
      margin-top: 24px;
      font-size: 1.6rem;
      text-decoration: none;
      color: white;
      border: 1px solid rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.12);
      box-shadow: 0 0 16px rgba(255,255,255,0.16);
      backdrop-filter: blur(4px);
      transition: all 0.2s ease;
      border-radius: 60% 40% 60% 40% / 55% 45% 55% 45%;
      animation: fadeIn 6s ease-in;
    }

    .leaf-btn:hover {
      background: white;
      color: black;
      box-shadow: 0 0 24px rgba(255,255,255,0.3);
      transform: translateY(-2px) scale(1.04);
    }

    .message-box {
      display: none;
      max-width: 620px;
      margin-top: 18px;
      padding: 0.95rem 1.1rem;
      border-radius: 22px;
      background: rgba(32, 22, 14, 0.26);
      border: 1px solid rgba(255,255,255,0.24);
      backdrop-filter: blur(6px);
      font-size: 1.02rem;
      line-height: 1.6;
      animation: fadeIn 0.5s ease-in;
    }

    .button-row {
      margin-top: 28px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 14px;
      animation: fadeIn 7s ease-in;
    }

    .btn {
      display: inline-block;
      padding: 12px 22px;
      border-radius: 28px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.78);
      color: white;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 0 16px rgba(255,255,255,0.14);
      backdrop-filter: blur(4px);
      transition: all 0.2s ease;
    }

    .btn:hover {
      background: white;
      color: black;
      box-shadow: 0 0 22px rgba(255,255,255,0.28);
      transform: translateY(-2px);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 2.1em;
      }

      p {
        font-size: 1.05em;
      }

      .button-row {
        flex-direction: column;
        align-items: center;
      }

      .btn {
        width: 90%;
        max-width: 320px;
      }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <h1>Walk gently...</h1>
    <p>You are safe here.</p>

    <a href="#" class="leaf-btn" onclick="generateMessage(); return false;" title="Reveal your message">🍃</a>

    <div id="messageBox" class="message-box">
      <strong>Affirmation:</strong> <span id="affirmation"></span>
    </div>

    <div class="button-row">
      <a href="falls.html" class="btn">Continue to the Falls</a>
      <a href="cafe.html" class="btn">Visit the Woodland Café</a>
      <a href="river.html" class="btn">Sit by the River</a>
      <a href="natureshop.html" class="btn">Back</a>
    </div>
  </div>

  <script>
    function generateMessage() {
      const affirmations = [
        "Like the quiet river, you are allowed to flow gently today.",
        "You do not need to rush — the forest grows in its own time.",
        "Your energy is enough, even in stillness.",
        "Breathe in calm, breathe out pressure.",
        "You are held, even when things feel uncertain.",
        "You can move slowly and still be moving forward.",
        "Gentleness is strength in its softest form.",
        "There is no rush here.",
        "You are allowed to pause without guilt.",
        "Peace can meet you exactly where you are."
      ];

      const chosen = affirmations[Math.floor(Math.random() * affirmations.length)];
      document.getElementById("affirmation").textContent = chosen;
      document.getElementById("messageBox").style.display = "block";
    }
  </script>
</body>
</html>
