<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Sanctuary Path</title>
<div style="margin-top:40px;">
  <p>🍃 Pause… something is here for you</p>
  <button onclick="generateMessage()">✨ Reveal Your Message</button>

  <div id="messageBox" style="display:none; margin-top:20px;">
    <p><strong>Affirmation:</strong> <span id="affirmation"></span></p>
    <p><strong>Image Idea:</strong> <span id="imageIdea"></span></p>
    <p><strong>Theme:</strong> <span id="theme"></span></p>
  </div>
</div>
<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Georgia', serif;
    background: url('assets/Landingpagesignpostsanctuaryfalls.png') no-repeat center center fixed;
    background-size: cover;
    color: white;
    text-align: center;
}

 background: transparent;

}

    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

h1 {
  color: white;
  text-shadow: 0 0 15px rgba(0,0,0,0.6);
}
    font-size: 2.5em;
    animation: fadeIn 3s ease-in;
}

p {
    font-size: 1.2em;
    margin-top: 10px;
    animation: fadeIn 5s ease-in;
}

.buttons {
    margin-top: 40px;
}

button {
    background-color: rgba(255,255,255,0.2);
    border: 1px solid white;
    color: white;
    padding: 12px 25px;

}

<body>

<div class="overlay">
    <h1>Walk gently…</h1>
    <p>You are safe here.</p>

    <div class="buttons">
        <button onclick="location.href='falls.html'">Continue to the Falls</button>
        <button onclick="location.href='cafe.html'">Visit the Woodland Café</button>
        <button onclick="location.href='river.html'">Sit by the River</button>
        <button onclick="location.href='index.html'">Back</button>
    </div> 
    
</div>
<script>
function generateMessage() {
  const affirmations = [
    "Like the quiet river, you are allowed to flow gently today.",
    "You do not need to rush — the forest grows in its own time.",
    "Your energy is enough, even in stillness.",
    "Breathe in calm, breathe out pressure.",
    "You are held, even when things feel uncertain."
  ];

  const images = [
    "misty woodland with a deer",
    "waterfall flowing over mossy rocks",
    "sunrise over calm sea",
    "forest path with soft golden light",
    "owl resting on a tree branch at dusk"
  ];

  const themes = [
    "stillness",
    "renewal",
    "grounding",
    "gentle energy",
    "inner peace"
  ];

  document.getElementById("affirmation").textContent =
    affirmations[Math.floor(Math.random() * affirmations.length)];

  document.getElementById("imageIdea").textContent =
    images[Math.floor(Math.random() * images.length)];

  document.getElementById("theme").textContent =
    themes[Math.floor(Math.random() * themes.length)];

  document.getElementById("messageBox").style.display = "block";
}
</script>
</body>
</html>
