<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nature Nurture Wellbeing</title>

  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      color: white;
      background: url("coast.jpg") no-repeat center center fixed;
      background-size: cover;
    }

    .overlay {
      background: rgba(20, 30, 40, 0.35);
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 1rem;
    }

    h1 {
      font-size: clamp(4rem, 7vw, 6rem);
      margin: 0;
      text-shadow: 0 4px 25px rgba(0,0,0,0.6);
    }

    .sub {
      font-size: 1.3rem;
      margin-top: 12px;
      margin-bottom: 28px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }

    .enter-btn {
      padding: 14px 28px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.12);
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      backdrop-filter: blur(4px);
      box-shadow: 0 0 18px rgba(255,255,255,0.18);
      transition: all 0.25s ease;
    }

    .enter-btn:hover {
      background: white;
      color: black;
      box-shadow: 0 0 28px rgba(255,255,255,0.35);
      transform: translateY(-2px);
    }

    .footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.9rem;
      opacity: 0.8;
    }

    @media (max-width: 700px) {
      h1 {
        font-size: clamp(3rem, 9vw, 4.5rem);
      }

      .sub {
        font-size: 1.1rem;
      }
    }
  </style>
</head>

<body>
  <div class="overlay">
    <h1>Nature Nurture Wellbeing</h1>

    <div class="sub">
      Breathe… you’ve arrived
    </div>

    <button class="enter-btn" onclick="location.href='signs.html'">
      Enter the Sanctuary
    </button>

    <div class="footer">
      Take your time. There is no rush.
    </div>
  </div>
</body>
</html>
